#===============================================================================
# SXT Validator Dashboard - Docker Compose
#
# Usage:
#   cp .env.example .env     # adjust values
#   docker compose up -d     # launch stack
#   open http://localhost:3000  (Grafana)
#===============================================================================

services:
  # -----------------------------------------------------------
  # ClickHouse — historical economic data
  # -----------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: sxt-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: sxt
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - sxt-monitor

  # -----------------------------------------------------------
  # Custom SXT exporter (Python)
  # Polls RPC for metrics not in native Prometheus endpoint
  # -----------------------------------------------------------
  sxt-exporter:
    build: ./exporter
    container_name: sxt-exporter
    restart: unless-stopped
    environment:
      SXT_RPC_URL: ${SXT_RPC_URL:-http://172.17.0.1:9944}
      SXT_EXPORTER_POLL_INTERVAL: ${SXT_EXPORTER_POLL_INTERVAL:-12}
      SXT_EXPORTER_PORT: ${SXT_EXPORTER_PORT:-9101}
      SXT_EXPORTER_LOG_LEVEL: ${SXT_EXPORTER_LOG_LEVEL:-INFO}
      SXT_VALIDATOR_NAME: ${SXT_VALIDATOR_NAME:-unknown}
      SXT_STAKING_POLL_INTERVAL: ${SXT_STAKING_POLL_INTERVAL:-120}
      SXT_PRICE_POLL_INTERVAL: ${SXT_PRICE_POLL_INTERVAL:-300}
      SXT_CLICKHOUSE_HOST: clickhouse
      SXT_CLICKHOUSE_PORT: "8123"
      SXT_CLICKHOUSE_DB: sxt
      SXT_CLICKHOUSE_ENABLED: "true"
    ports:
      - "127.0.0.1:${SXT_EXPORTER_PORT:-9101}:${SXT_EXPORTER_PORT:-9101}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${SXT_EXPORTER_PORT:-9101}/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - sxt-monitor

  # -----------------------------------------------------------
  # Prometheus
  # Scrapes: native substrate (:9615), exporter (:9101),
  #          node_exporter (:9100)
  # -----------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: sxt-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}'
      - '--web.listen-address=:${PROMETHEUS_PORT:-9090}'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - ./prometheus/prometheus.rendered.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:${PROMETHEUS_PORT:-9090}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      sxt-exporter:
        condition: service_healthy
    networks:
      - sxt-monitor

  # -----------------------------------------------------------
  # Grafana
  # Auto-provisioned datasources + dashboards
  # -----------------------------------------------------------
  grafana:
    image: grafana/grafana:12.3.2
    container_name: sxt-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:${GRAFANA_PORT:-3000}"
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
      - clickhouse
    networks:
      - sxt-monitor

volumes:
  prometheus-data:
  grafana-data:
  clickhouse-data:

networks:
  sxt-monitor:
    name: sxt-monitor
